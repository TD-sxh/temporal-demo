version: "3.9"

services:
  temporal-db:
    image: postgres:12
    container_name: temporal-db
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "5432:5432"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d

  temporal-server:
    image: temporalio/auto-setup:1.29.2
    container_name: temporal-server
    depends_on:
      - temporal-db
    environment:
      DB: postgres12
      DBNAME: temporal
      POSTGRES_SEEDS: temporal-db
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_DB: temporal
      DB_PORT: 5432
    ports:
      - "7233:7233"

  temporal-init:
    image: temporalio/auto-setup:1.29.2
    container_name: temporal-init
    depends_on:
      - temporal-server
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo 'Waiting for Temporal server to be ready...'
        until echo Y | tctl --address temporal-server:7233 cluster health 2>&1 | grep -q SERVING; do
          sleep 3
        done
        echo 'Registering customStatus search attribute...'
        echo Y | tctl --address temporal-server:7233 admin cluster add-search-attributes --name customStatus --type Keyword 2>&1 || true
        echo 'temporal-init done.'
    restart: "no"

  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: temporal-ui
    depends_on:
      - temporal-server
    environment:
      TEMPORAL_ADDRESS: temporal-server:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8080
    ports:
      - "8080:8080"

  engine-api:
    build:
      context: .
      dockerfile: engine-api/Dockerfile
    container_name: engine-api
    depends_on:
      - temporal-server
      - definition-service
    environment:
      TEMPORAL_SERVER_TARGET: temporal-server:7233
      DEFINITION_SERVICE_URL: http://definition-service:8082
    ports:
      - "8081:8081"

  definition-service:
    build:
      context: .
      dockerfile: definition-service/Dockerfile
    container_name: definition-service
    depends_on:
      - temporal-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://temporal-db:5432/engine
      SPRING_DATASOURCE_USERNAME: temporal
      SPRING_DATASOURCE_PASSWORD: temporal
    ports:
      - "8082:8082"

  engine-core:
    build:
      context: .
      dockerfile: engine-core/Dockerfile
    container_name: engine-core
    depends_on:
      - temporal-server
    environment:
      TEMPORAL_SERVER_TARGET: temporal-server:7233

  health-check-worker:
    build:
      context: .
      dockerfile: health-check-worker/Dockerfile
    container_name: health-check-worker
    depends_on:
      - temporal-server
      - definition-service
    environment:
      TEMPORAL_SERVER_TARGET: temporal-server:7233
      DEFINITION_SERVICE_URL: http://definition-service:8082

  workflow-admin:
    build:
      context: .
      dockerfile: workflow-admin/Dockerfile
    container_name: workflow-admin
    depends_on:
      - temporal-server
    environment:
      TEMPORAL_SERVER_TARGET: temporal-server:7233
    ports:
      - "8083:8083"
