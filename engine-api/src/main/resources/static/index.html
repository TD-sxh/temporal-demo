<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow Designer</title>

    <!-- Drawflow -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow@0.0.59/dist/drawflow.min.css">
    <script src="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow@0.0.59/dist/drawflow.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- App CSS -->
    <link rel="stylesheet" href="/css/designer.css">
</head>
<body>

<!-- ═══════════════ Toolbar ═══════════════ -->
<header id="toolbar">
    <div class="toolbar-left">
        <span class="logo"><i class="fa-solid fa-diagram-project"></i> Workflow Designer</span>
        <div class="toolbar-divider"></div>
        <div class="workflow-meta">
            <input id="wf-type" type="text" placeholder="flow type (e.g. health-check-flow)" spellcheck="false">
            <input id="wf-name" type="text" placeholder="flow name" spellcheck="false">
        </div>
    </div>
    <div class="toolbar-center">
        <button id="btn-new" title="新建"><i class="fa-solid fa-file-circle-plus"></i> 新建</button>
        <button id="btn-import" title="从后端加载"><i class="fa-solid fa-cloud-arrow-down"></i> 加载</button>
        <button id="btn-save" title="保存到后端"><i class="fa-solid fa-floppy-disk"></i> 保存</button>
        <button id="btn-publish" title="发布"><i class="fa-solid fa-rocket"></i> 发布</button>
        <div class="toolbar-divider"></div>
        <button id="btn-export" title="导出 JSON"><i class="fa-solid fa-file-export"></i> 导出</button>
        <button id="btn-import-json" title="导入 JSON"><i class="fa-solid fa-file-import"></i> 导入</button>
        <div class="toolbar-divider"></div>
        <button id="btn-run" class="btn-primary" title="启动工作流"><i class="fa-solid fa-play"></i> 启动</button>
        <button id="btn-batch" class="btn-secondary" title="批量启动"><i class="fa-solid fa-layer-group"></i> 批量启动</button>
    </div>
    <div class="toolbar-right">
        <button id="btn-zoom-in" title="放大"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
        <button id="btn-zoom-out" title="缩小"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
        <button id="btn-zoom-reset" title="重置"><i class="fa-solid fa-expand"></i></button>
    </div>
</header>

<!-- ═══════════════ Main Layout ═══════════════ -->
<div id="main">
    <!-- ─── Left: Node Palette ─── -->
    <aside id="palette">
        <h3><i class="fa-solid fa-shapes"></i> 节点面板</h3>
        <div class="palette-nodes">
            <div class="palette-node" draggable="true" data-type="START">
                <div class="palette-icon start"><i class="fa-solid fa-play"></i></div>
                <span>开始节点</span>
                <small>流程入口</small>
            </div>
            <div class="palette-node" draggable="true" data-type="TASK">
                <div class="palette-icon task"><i class="fa-solid fa-gear"></i></div>
                <span>任务节点</span>
                <small>执行 Activity</small>
            </div>
            <div class="palette-node" draggable="true" data-type="BRANCH">
                <div class="palette-icon branch"><i class="fa-solid fa-code-branch"></i></div>
                <span>分支节点</span>
                <small>条件路由</small>
            </div>
            <div class="palette-node" draggable="true" data-type="WAIT">
                <div class="palette-icon wait"><i class="fa-solid fa-hourglass-half"></i></div>
                <span>等待节点</span>
                <small>等待信号</small>
            </div>
            <div class="palette-node" draggable="true" data-type="PARALLEL">
                <div class="palette-icon parallel"><i class="fa-solid fa-arrows-split-up-and-left"></i></div>
                <span>并行节点</span>
                <small>并发执行</small>
            </div>
            <div class="palette-node" draggable="true" data-type="LOOP">
                <div class="palette-icon loop"><i class="fa-solid fa-rotate"></i></div>
                <span>循环节点</span>
                <small>条件循环</small>
            </div>
            <div class="palette-node" draggable="true" data-type="DELAY">
                <div class="palette-icon delay"><i class="fa-solid fa-clock"></i></div>
                <span>延时节点</span>
                <small>定时等待</small>
            </div>
            <div class="palette-node" draggable="true" data-type="END">
                <div class="palette-icon end"><i class="fa-solid fa-stop"></i></div>
                <span>结束节点</span>
                <small>流程终点</small>
            </div>
        </div>
        <div class="palette-footer">
            <small>拖拽节点到画布</small>
        </div>
    </aside>

    <!-- ─── Center: Drawflow Canvas ─── -->
    <div id="drawflow"></div>

    <!-- ─── Right: Property Panel ─── -->
    <aside id="properties" class="hidden">
        <div class="props-header">
            <h3><i class="fa-solid fa-sliders"></i> 节点属性</h3>
            <button id="btn-close-props" title="关闭"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="props-content">
            <!-- Dynamic content injected by JS -->
        </div>
        <div class="props-footer">
            <button id="btn-delete-node" class="btn-danger"><i class="fa-solid fa-trash"></i> 删除节点</button>
        </div>
    </aside>
</div>

<!-- ═══════════════ Modals ═══════════════ -->

<!-- Load from backend modal -->
<div id="modal-load" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h3>加载工作流定义</h3>
            <button class="modal-close"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <div id="load-list" class="load-list">
                <p class="loading">加载中...</p>
            </div>
        </div>
    </div>
</div>

<!-- JSON export/import modal -->
<div id="modal-json" class="modal hidden">
    <div class="modal-content modal-lg">
        <div class="modal-header">
            <h3 id="modal-json-title">JSON</h3>
            <button class="modal-close"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <textarea id="json-editor" spellcheck="false"></textarea>
        </div>
        <div class="modal-footer">
            <button id="btn-json-copy" class="btn-secondary"><i class="fa-solid fa-copy"></i> 复制</button>
            <button id="btn-json-apply" class="btn-primary hidden"><i class="fa-solid fa-check"></i> 应用</button>
        </div>
    </div>
</div>

<!-- Run workflow modal -->
<div id="modal-run" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h3>启动工作流</h3>
            <button class="modal-close"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <label>Workflow ID (可选)</label>
            <input id="run-workflow-id" type="text" placeholder="自动生成">
            <label>输入变量 (JSON)</label>
            <textarea id="run-input-vars" spellcheck="false">{
  "patientId": "P001",
  "patientName": "张三",
  "doctorName": "Dr. Smith",
  "visitReason": "Annual checkup",
  "scenario": "normal"
}</textarea>
            <div id="run-result" class="hidden"></div>
        </div>
        <div class="modal-footer">
            <button id="btn-run-confirm" class="btn-primary"><i class="fa-solid fa-play"></i> 启动</button>
        </div>
    </div>
</div>

<!-- Batch-start modal -->
<div id="modal-batch" class="modal hidden">
    <div class="modal-content modal-lg">
        <div class="modal-header">
            <h3>批量启动工作流 — <span id="batch-type-label"></span></h3>
            <button class="modal-close"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <label>Items (JSON 数组)</label>
            <textarea id="batch-items" spellcheck="false" rows="12">[
  { "inputVariables": {} },
  { "inputVariables": {} }
]</textarea>
            <div class="prop-hint">每个 item 可包含 workflowId (可选) 和 inputVariables</div>
            <pre id="batch-result" class="hidden"></pre>
        </div>
        <div class="modal-footer">
            <button id="btn-batch-confirm" class="btn-primary"><i class="fa-solid fa-layer-group"></i> 批量启动</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<script src="/js/designer.js"></script>
</body>
</html>
