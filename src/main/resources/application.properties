spring.application.name=temporal-demo

# Web server port (8081 to avoid conflict with Temporal UI on 8080)
server.port=8081

# Temporal server address
temporal.server.target=127.0.0.1:7233

# Engine task queue
engine.task-queue=orchestrator-task-queue

# ─── PostgreSQL (reuse the same instance as Temporal, but separate DB) ───
spring.datasource.url=jdbc:postgresql://localhost:5432/engine
spring.datasource.username=temporal
spring.datasource.password=temporal
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
